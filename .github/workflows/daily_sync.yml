name: Daily OptiSigns Knowledge Sync

on:
  schedule:
    # Chạy vào lúc 02:00 UTC (09:00 AM giờ Việt Nam) hàng ngày
    - cron: '0 2 * * *'
  workflow_dispatch: # Cho phép kích hoạt chạy tay trực tiếp trên giao diện GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền cho Action để push file log ngược lại repository

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run sync script and save log
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        mkdir -p log
        python main.py > log/last_run.log 2>&1

    - name: Commit and Push last_run.log
      if: always()
      run: |
        if [ -f log/last_run.log ]; then
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add log/last_run.log
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update daily sync log [skip ci]" && git push)
        fi
